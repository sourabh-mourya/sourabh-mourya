      <!-- social icons -->
      <g font-family="Consolas, Monaco, monospace" font-size="12" fill="#0F172A" text-anchor="middle">
        <g filter="url(#strongGlow)">
          <circle cx="545" cy="520" r="20" fill="rgba(15,23,42,0.04)" stroke="url(#accentGrad)" stroke-width="1.4">
            <animate attributeName="stroke-width" values="1;1.8;1" dur="3s" repeatCount="indefinite"/>
          </circle>
          <text x="545" y="524">GH</text>
        </g>
        <g filter="url(#strongGlow)">
          <circle cx="605" cy="520" r="20" fill="rgba(15,23,42,0.04)" stroke="url(#accentGrad)" stroke-width="1.4">
            <animate attributeName="stroke-width" values="1;1.8;1" dur="3s" begin="0.4s" repeatCount="indefinite"/>
          </circle>
          <text x="605" y="524">in</text>
        </g>
        <g filter="url(#strongGlow)">
          <circle cx="665" cy="520" r="20" fill="rgba(15,23,42,0.04)" stroke="url(#accentGrad)" stroke-width="1.4">
            <animate attributeName="stroke-width" values="1;1.8;1" dur="3s" begin="0.8s" repeatCount="indefinite"/>
          </circle>
          <text x="665" y="524">✉</text>
        </g>
        <g filter="url(#strongGlow)">
          <circle cx="725" cy="520" r="20" fill="rgba(15,23,42,0.04)" stroke="url(#accentGrad)" stroke-width="1.4">
            <animate attributeName="stroke-width" values="1;1.8;1" dur="3s" begin="1.2s" repeatCount="indefinite"/>

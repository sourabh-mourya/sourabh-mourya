name: Update README — Color Rotate + Snake

on:
  schedule:
    - cron: "0 */8 * * *"   # har 8 ghante mein run hoga (3 baar/din)
  workflow_dispatch:          # manually bhi trigger kar sakte ho

jobs:
  # ─────────────────────────────────────
  # JOB 1: Snake animation generate karo
  # ─────────────────────────────────────
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: sourabh-mourya
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────
  # JOB 2: Header/Footer color rotate karo
  # ─────────────────────────────────────
  rotate-color:
    runs-on: ubuntu-latest
    needs: generate-snake

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rotate color theme in README
        run: |
          # Teen themes — har run pe agle pe shift hoga
          THEME_1="0:0d1117,50:1a2332,100:58A6FF"   # Electric Blue
          THEME_2="0:0b2447,50:19376D,100:576CBC"   # Navy Blue
          THEME_3="0:003153,50:0077b6,100:48cae4"   # Ocean Teal

          # Current theme README se read karo
          CURRENT=$(grep -o 'color=0:[^&]*' README.md | head -1 | sed 's/color=//')

          # Next theme decide karo
          if [ "$CURRENT" = "$THEME_1" ]; then
            NEXT="$THEME_2"
          elif [ "$CURRENT" = "$THEME_2" ]; then
            NEXT="$THEME_3"
          else
            NEXT="$THEME_1"
          fi

          echo "Switching from: $CURRENT"
          echo "Switching to:   $NEXT"

          # README mein replace karo (header + divider + footer teeno)
          sed -i "s|color=$CURRENT|color=$NEXT|g" README.md

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: rotate header/footer color theme [skip ci]"
          git push

name: Update README — Color Rotate + Snake

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────
  # JOB 1: Snake animation generate karo
  # ─────────────────────────────────────
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: sourabh-mourya
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────
  # JOB 2: Header/Footer color rotate karo
  # ─────────────────────────────────────
  rotate-color:
    runs-on: ubuntu-latest
    needs: generate-snake

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rotate color theme in README
        run: |
          THEME_1="0:0d1117,50:1a2332,100:58A6FF"
          THEME_2="0:0b2447,50:19376D,100:576CBC"
          THEME_3="0:003153,50:0077b6,100:48cae4"

          CURRENT=$(grep -o 'color=0:[^&"]*' README.md | head -1 | sed 's/color=//')

          if [ "$CURRENT" = "$THEME_1" ]; then
            NEXT="$THEME_2"
          elif [ "$CURRENT" = "$THEME_2" ]; then
            NEXT="$THEME_3"
          else
            NEXT="$THEME_1"
          fi

          echo "Switching: $CURRENT → $NEXT"
          sed -i "s|color=$CURRENT|color=$NEXT|g" README.md

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: rotate header/footer color theme [skip ci]"
          git pull --rebase origin main
          git push
